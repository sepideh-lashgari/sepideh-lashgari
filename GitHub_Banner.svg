<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0a0618"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Glow circles -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="url(#glow1)"/>
  <ellipse cx="1000" cy="200" rx="300" ry="200" fill="url(#glow2)"/>

  <!-- Decorative dots -->
  <circle cx="100" cy="80" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="180" cy="320" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="1100" cy="100" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="1050" cy="330" r="2" fill="#a855f7" opacity="0.5"/>
  <circle cx="600" cy="50" r="2" fill="#c084fc" opacity="0.4"/>
  <circle cx="650" cy="360" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="300" cy="150" r="1.5" fill="#a855f7" opacity="0.4"/>
  <circle cx="900" cy="250" r="1.5" fill="#c084fc" opacity="0.4"/>

  <!-- Decorative lines -->
  <line x1="0" y1="395" x2="1200" y2="395" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="5" x2="1200" y2="5" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>

  <!-- Main text -->
  <text x="600" y="190" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">Hi, I'm Sepi 👋</text>

  <!-- Subtitle -->
  <text x="600" y="265" font-family="Arial, sans-serif" font-size="28" fill="#c084fc" text-anchor="middle" opacity="0.9">Full-Stack Developer  •  Cybersecurity Enthusiast</text>

  <!-- Bottom tag -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="18" fill="#7c3aed" text-anchor="middle" opacity="0.8">React  •  Node.js  •  SQL  •  Security</text>
</svg>
